<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>University Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #36393f;
      color: white;
    }

    header {
      background: #2f3136;
      padding: 12px;
      font-weight: bold;
    }

    #appContainer {
      display: flex;
      height: calc(100vh - 50px);
    }

    #sidebar {
      width: 80px;
      background: #202225;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
      gap: 10px;
    }

    .serverBtn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #5865f2;
      color: white;
      cursor: pointer;
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #posts {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #2f3136;
    }

    #postInput {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #40444b;
      color: white;
    }

    button.send {
      margin-left: 10px;
      background: #5865f2;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* LOGIN */
    #loginBox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #202225;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 10px;
    }

    #loginBox input {
      padding: 10px;
      border: none;
      border-radius: 6px;
      width: 200px;
    }

    #loginBox button {
      padding: 12px 20px;
      border: none;
      background: #5865f2;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    University Chat for Software Engineering
  </header>

  <!-- LOGIN SCREEN (SIMPLES) -->
  <div id="loginBox">
    <h2>Login</h2>

    <input id="username" placeholder="username" />
    <input id="password" type="password" placeholder="password" />

    <button onclick="doLogin()">Login</button>
  </div>

  <!-- APP -->
  <div id="appContainer">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <button class="serverBtn">G</button>
      <button class="serverBtn">AI</button>
      <button class="serverBtn">S</button>
    </div>

    <!-- CHAT -->
    <div id="chat">

      <div id="posts"></div>

      <div id="inputArea">
        <input id="postInput" placeholder="Write a message..." />
        <button class="send" onclick="createPost()">Send</button>
      </div>

    </div>

  </div>

  <!-- JS -->
  <script type="module" src="./index.js"></script>

  <!-- LOGIN BRIDGE -->
  <script type="module">
    import { login } from "./auth.js";

    window.doLogin = function () {
      const u = document.getElementById("username").value;
      const p = document.getElementById("password").value;

      const user = login(u, p);

      if (user) {
        location.reload();
      }
    };
  </script>

</body>

</html>
