<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🌐 Welcome message (global system message)
const WELCOME_MESSAGE = "Welcome to the academic and university forum";

// Firebase config
const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "COLE_AQUI",
  projectId: "COLE_AQUI",
  storageBucket: "COLE_AQUI",
  messagingSenderId: "COLE_AQUI",
  appId: "COLE_AQUI"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// 🔐 LOGIN GOOGLE
window.loginGoogle = async function () {
  const provider = new GoogleAuthProvider();

  try {
    const result = await signInWithPopup(auth, provider);
    currentUser = result.user;

    document.getElementById("loginBox").style.display = "none";

    alert(`${WELCOME_MESSAGE}\n\nWelcome ${currentUser.displayName}`);
  } catch (error) {
    console.error("Login error:", error);
    alert("Login failed. Try again.");
  }
};

// 📝 CRIAR POST (FIRESTORE)
window.createPost = async function () {
  const text = document.getElementById("postInput").value.trim();

  if (!text) return;
  if (!currentUser) {
    alert("You must be logged in to post.");
    return;
  }

  try {
    await addDoc(collection(db, "posts"), {
      text: text,
      user: currentUser.displayName,
      photo: currentUser.photoURL,
      createdAt: serverTimestamp()
    });

    document.getElementById("postInput").value = "";
  } catch (error) {
    console.error("Error creating post:", error);
  }
};

// 📡 ESCUTAR POSTS EM TEMPO REAL
const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  // Optional: show welcome message at top of feed
  const welcomeDiv = document.createElement("div");
  welcomeDiv.className = "post";
  welcomeDiv.innerHTML = `<p><b>${WELCOME_MESSAGE}</b></p>`;
  container.appendChild(welcomeDiv);

  snapshot.forEach((doc) => {
    const post = doc.data();

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <p><b>${post.user}</b></p>
      <p>${post.text}</p>
    `;

    container.appendChild(div);
  });
});
</script>
