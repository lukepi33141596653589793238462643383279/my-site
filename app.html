
<body>

  <!-- 🧯 FALLBACK ROOT (caso tudo falhe) -->
  <div id="fallback-root"></div>

  <!-- HEADER -->
  <header style="background:#2f3136;padding:12px;color:white;font-weight:bold;">
    University Chat for Software Engineering
  </header>

  <!-- APP CONTAINER -->
  <div id="appContainer"
    style="display:flex;height:100vh;background:#36393f;color:white;">

    <!-- SIDEBAR SERVERS -->
    <div style="width:80px;background:#202225;display:flex;flex-direction:column;align-items:center;padding-top:10px;gap:10px;">

      <button class="serverBtn" data-server="general"
        style="width:50px;height:50px;border-radius:50%;background:#5865f2;border:none;color:white;">
        G
      </button>

      <button class="serverBtn" data-server="ai"
        style="width:50px;height:50px;border-radius:50%;background:#5865f2;border:none;color:white;">
        AI
      </button>

      <button class="serverBtn" data-server="study"
        style="width:50px;height:50px;border-radius:50%;background:#5865f2;border:none;color:white;">
        S
      </button>

    </div>

    <!-- CHAT AREA -->
    <div style="flex:1;display:flex;flex-direction:column;">

      <!-- POSTS -->
      <div id="posts"
        style="flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;">
      </div>

      <!-- INPUT -->
      <div style="display:flex;padding:10px;background:#2f3136;">

        <input id="postInput"
          style="flex:1;padding:10px;border:none;border-radius:6px;background:#40444b;color:white;"
          placeholder="Write a message..." />

        <button id="sendBtn"
          style="margin-left:10px;background:#5865f2;border:none;color:white;padding:10px 15px;border-radius:6px;">
          Send
        </button>

      </div>

    </div>
  </div>


  <!-- ========================= -->
  <!-- 🧯 ERROR HANDLER PRIMEIRO -->
  <!-- ========================= -->
  <script type="module">
    import "./error-handler.js";
  </script>


  <!-- ========================= -->
  <!-- 🚀 FIREBASE / APP SCRIPT -->
  <!-- ========================= -->
  <script type="module">

    // 🔥 IMPORTAÇÕES SEGURAS
    import {
      loginGoogle,
      createPost,
      onUserChange,
      listenPosts
    } from "./firebase.js";


    // =========================
    // 🧠 SAFE DOM REFERENCES
    // =========================
    const postsEl = document.getElementById("posts");
    const inputEl = document.getElementById("postInput");
    const sendBtn = document.getElementById("sendBtn");


    // =========================
    // 🔐 USER STATE SAFE
    // =========================
    let currentUser = null;

    onUserChange((user) => {
      currentUser = user;

      if (!user) {
        showFallbackIfNeeded();
      }
    });


    // =========================
    // 💬 SEND MESSAGE SAFE
    // =========================
    async function safeSend() {
      try {
        if (!inputEl || !inputEl.value.trim()) return;

        await createPost(inputEl.value, currentUser);

        inputEl.value = "";

      } catch (err) {
        console.error("Send error:", err);
      }
    }


    // =========================
    // 📡 REALTIME POSTS SAFE
    // =========================
    listenPosts((posts) => {
      if (!postsEl) return;

      postsEl.innerHTML = "";

      posts.forEach(p => {
        const div = document.createElement("div");

        div.style.padding = "10px";
        div.style.background = "#40444b";
        div.style.borderRadius = "6px";

        div.innerHTML = `
          <b>${p.user || "Unknown"}</b><br/>
          ${p.text || ""}
        `;

        postsEl.appendChild(div);
      });
    });


    // =========================
    // 🖱 EVENTS SAFE
    // =========================
    sendBtn?.addEventListener("click", safeSend);

    inputEl?.addEventListener("keypress", (e) => {
      if (e.key === "Enter") safeSend();
    });


    // =========================
    // 🧯 FALLBACK UI (ANTI TELA BRANCA)
    // =========================
    function showFallbackIfNeeded() {
      const fallback = document.getElementById("fallback-root");

      if (!fallback) return;

      if (!currentUser) {
        fallback.innerHTML = `
          <div style="
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            background:#202225;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            color:white;
            z-index:9999;
          ">
            <h2>⚠️ You are not logged in</h2>
            <p>Please login to continue</p>
            <button onclick="location.href='index.html'"
              style="padding:10px;background:#5865f2;border:none;color:white;border-radius:6px;">
              Go to Login
            </button>
          </div>
        `;
      }
    }

  </script>

</body>
