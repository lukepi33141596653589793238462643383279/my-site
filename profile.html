<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Create Profile - University Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #36393f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #2f3136;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      background: #40444b;
      color: white;
    }

    button {
      background: #5865f2;
      border: none;
      padding: 12px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #4752c4;
    }

    .title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .userInfo {
      font-size: 12px;
      color: #b9bbbe;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="title">Create your profile</div>

    <div class="userInfo" id="userInfo"></div>

    <input id="username" placeholder="Username" />

    <button onclick="saveProfile()">Continue</button>
  </div>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔧 CONFIG FIREBASE
    const firebaseConfig = {
      apiKey: "COLE_AQUI",
      authDomain: "COLE_AQUI",
      projectId: "COLE_AQUI",
      storageBucket: "COLE_AQUI",
      messagingSenderId: "COLE_AQUI",
      appId: "COLE_AQUI"
    };

    // 🚀 INIT
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    // 🔐 VERIFICA LOGIN REAL (NÃO LOCALSTORAGE)
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      currentUser = user;

      document.getElementById("userInfo").innerText =
        "Logged in as: " + user.email;
    });


    // 💾 SALVAR PERFIL
    window.saveProfile = async function () {
      const username = document.getElementById("username").value.trim();

      if (!username) {
        alert("Username required");
        return;
      }

      if (!currentUser) {
        alert("User not authenticated");
        return;
      }

      try {
        await setDoc(doc(db, "users", currentUser.uid), {
          username: username,
          email: currentUser.email,
          photo: currentUser.photoURL || null,
          uid: currentUser.uid,
          createdAt: Date.now()
        });

        window.location.href = "app.html";

      } catch (error) {
        console.error(error);
        alert("Error creating profile");
      }
    };
  </script>

</body>

</html>
